services:
  db:
    image: mysql:8
    container_name: hesk-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${HESK_DB_NAME}
      MYSQL_USER: ${HESK_DB_USER}
      MYSQL_PASSWORD: ${HESK_DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  hesk-web:
    build:
      context: .
      dockerfile: docker/hesk/Dockerfile
    container_name: hesk-web
    restart: always
    depends_on:
      - db
    ports:
      - "8080:80"
    volumes:
      - ./hesk:/var/www/html

volumes:
  db_data:












